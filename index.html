<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gulece — your space to bloom</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #f9f7f4;
            --surface: #ffffff;
            --text: #2c2b28;
            --text-secondary: #7c7a72;
            --accent: #c17a62;
            --accent-soft: #f0e4dd;
            --accent-dark: #a55f48;
            --border: #e9e2da;
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.04);
            --shadow-floating: 0 8px 20px rgba(0, 0, 0, 0.08);
            --radius-xl: 28px;
            --radius-lg: 20px;
            --font: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .dark {
            --bg: #1a1917;
            --surface: #24221f;
            --text: #ece8e0;
            --text-secondary: #b4aea2;
            --accent: #e2a181;
            --accent-soft: #3d3630;
            --border: #3a3530;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            transition: background 0.2s, color 0.2s;
        }

        #app {
            max-width: 480px;
            margin: 0 auto;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            background: var(--bg);
        }

        .header {
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
            z-index: 15;
            position: relative;
        }

        .logo-custom {
            display: flex;
            align-items: baseline;
            gap: 2px;
        }
        .logo-gul {
            font-family: 'Pacifico', cursive;
            font-size: 1.9rem;
            font-weight: 500;
            color: var(--accent);
            letter-spacing: -0.5px;
            line-height: 1;
        }
        .logo-ece {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transform: rotate(-4deg) translateY(-2px);
            display: inline-block;
            color: var(--accent);
            background: var(--accent-soft);
            padding: 0px 4px;
            border-radius: 12px;
            font-family: var(--font);
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .icon-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--text);
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .icon-btn:active {
            background: var(--accent-soft);
        }

        .post-btn {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            color: white !important;
            box-shadow: 0 2px 8px rgba(193, 122, 98, 0.3);
            font-weight: 600;
        }
        .post-btn:active {
            transform: scale(0.95);
            background: var(--accent-dark);
        }

        .badge {
            position: absolute;
            top: 4px;
            right: 6px;
            background: var(--accent);
            color: white;
            font-size: 0.6rem;
            font-weight: 700;
            width: 18px;
            height: 18px;
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding-bottom: 80px;
            scroll-behavior: smooth;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 480px;
            margin: 0 auto;
            background: var(--surface);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 12px 14px;
            border-radius: 28px 28px 0 0;
            z-index: 20;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            font-size: 0.65rem;
            font-weight: 500;
            color: var(--text-secondary);
            transition: 0.2s;
            cursor: pointer;
            padding: 6px 8px;
            border-radius: 30px;
        }

        .nav-item .nav-icon {
            font-size: 1.5rem;
        }

        .nav-item.active {
            color: var(--accent);
            font-weight: 600;
        }

        .theme-float {
            position: fixed;
            bottom: 88px;
            right: 20px;
            z-index: 25;
            background: var(--surface);
            box-shadow: var(--shadow-floating);
            width: 44px;
            height: 44px;
            border-radius: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            border: 1px solid var(--border);
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: 0.2s;
        }

        .home-layout {
            display: flex;
            gap: 12px;
            padding: 8px 8px 8px 8px;
            position: relative;
        }

        .stories-vertical {
            width: 75px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-top: 6px;
            position: sticky;
            top: 8px;
            align-self: flex-start;
            background: transparent;
            z-index: 5;
        }

        .story-item {
            text-align: center;
            cursor: pointer;
            transition: 0.1s;
        }

        .story-avatar {
            width: 60px;
            height: 60px;
            border-radius: 60px;
            background: var(--accent-soft);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin: 0 auto 6px;
            border: 2px solid var(--accent);
            box-shadow: var(--shadow-sm);
            object-fit: cover;
            overflow: hidden;
        }

        .story-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .story-name {
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 70px;
        }

        .feed-column {
            flex: 1;
            padding-right: 10px;
        }

        .post-card {
            background: var(--surface);
            border-radius: 24px;
            margin-bottom: 18px;
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            transition: transform 0.1s;
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
        }

        .post-avatar {
            width: 38px;
            height: 38px;
            border-radius: 38px;
            background: var(--accent-soft);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            overflow: hidden;
        }
        .post-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .post-media {
            width: 100%;
            max-height: 450px;
            object-fit: cover;
            background: #1e1e1e;
        }

        .post-stats {
            padding: 8px 14px 0;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .post-caption {
            padding: 4px 14px 12px;
            font-size: 0.9rem;
        }

        .action-row {
            display: flex;
            gap: 24px;
            padding: 8px 14px 12px;
            border-top: 1px solid var(--border);
            margin-top: 4px;
        }

        .action-feed-btn {
            background: none;
            border: none;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 30px;
            transition: 0.1s;
        }

        .action-feed-btn:active {
            background: var(--accent-soft);
        }

        .action-feed-btn.liked {
            color: var(--accent);
        }

        .reels-container {
            height: calc(100vh - 56px - 70px);
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
        }

        .reel-item {
            height: 100%;
            scroll-snap-align: start;
            position: relative;
            background: black;
        }

        .reel-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .reel-overlay {
            position: absolute;
            bottom: 100px;
            left: 16px;
            color: white;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
            right: 80px;
        }

        .reel-actions {
            position: absolute;
            right: 12px;
            bottom: 120px;
            display: flex;
            flex-direction: column;
            gap: 26px;
        }

        .reel-action-btn {
            background: none;
            border: none;
            color: white;
            text-shadow: 0 0 5px black;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 1.6rem;
            gap: 3px;
            cursor: pointer;
        }

        .reel-action-btn span {
            font-size: 0.7rem;
            font-weight: 500;
        }

        .switch-bar {
            position: sticky;
            top: 0;
            z-index: 10;
            background: var(--surface);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(12px);
        }

        .back-btn {
            background: var(--accent-soft);
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 600;
            color: var(--text);
        }

        .video-list {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .video-card {
            background: var(--surface);
            border-radius: 22px;
            overflow: hidden;
            display: flex;
            gap: 12px;
            align-items: center;
            padding: 10px;
        }

        .video-thumb {
            width: 110px;
            height: 110px;
            background: #2e2b27;
            border-radius: 18px;
            object-fit: cover;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(6px);
            z-index: 200;
            display: none;
            align-items: flex-end;
        }

        .modal-card {
            background: var(--surface);
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            border-radius: 32px 32px 0 0;
            padding: 24px 20px 32px;
            animation: slideUp 0.2s ease;
            max-height: 80vh;
            overflow-y: auto;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .profile-tabs {
            display: flex;
            gap: 16px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }
        .profile-tab-btn {
            background: none;
            border: none;
            font-weight: 600;
            padding: 8px 0;
            color: var(--text-secondary);
            cursor: pointer;
            flex: 1;
        }
        .profile-tab-btn.active-tab {
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
        }
        
        /* story viewer refined */
        .story-viewer {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .story-viewer-content {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .story-header {
            position: absolute;
            top: 44px;
            left: 20px;
            z-index: 1002;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            padding: 6px 16px;
            border-radius: 100px;
            color: white;
        }
        .story-header-avatar {
            width: 36px;
            height: 36px;
            border-radius: 36px;
            background: var(--accent-soft);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            overflow: hidden;
        }
        .story-header-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .story-close {
            position: absolute;
            top: 44px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            width: 40px;
            height: 40px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            color: white;
            cursor: pointer;
            z-index: 1002;
        }
        .story-media {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .story-nav-left, .story-nav-right {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 50%;
            z-index: 1001;
            cursor: pointer;
        }
        .story-nav-left { left: 0; }
        .story-nav-right { right: 0; }
        
        .msg-last-line {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }
        .truncate-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }
        .repost-card-structured, .post-card-structured {
            background: var(--surface);
            border-radius: 20px;
            padding: 12px;
            box-shadow: var(--shadow-sm);
            margin-bottom: 12px;
            position: relative;
        }
        .repost-badge, .post-badge {
            font-size: 0.7rem;
            margin-bottom: 6px;
            font-weight: 600;
        }
        .repost-badge { color: var(--accent); }
        .post-badge { color: var(--text-secondary); }
        .delete-post-btn, .undo-repost-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: var(--accent-soft);
            border: none;
            font-size: 0.8rem;
            padding: 4px 10px;
            border-radius: 30px;
            font-weight: 500;
            cursor: pointer;
            color: var(--text);
        }
        .delete-post-btn { background: rgba(193,122,98,0.2); color: var(--accent-dark); }
        .undo-repost-btn { background: rgba(193,122,98,0.15); }
        
        .profile-info-card {
            text-align: center;
            padding: 24px;
            background: var(--surface);
            margin: 16px;
            border-radius: 32px;
            cursor: pointer;
            transition: 0.2s;
        }
        .profile-avatar-large {
            width: 80px;
            height: 80px;
            background: var(--accent-soft);
            border-radius: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 3rem;
            overflow: hidden;
            cursor: pointer;
        }
        .profile-avatar-large img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .edit-profile-btn {
            margin-top: 12px;
            background: var(--accent-soft);
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            color: var(--text);
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: 70vh;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message-bubble {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 24px;
            font-size: 0.9rem;
            word-wrap: break-word;
        }
        .message-left {
            align-self: flex-start;
            background: var(--accent-soft);
            color: var(--text);
            border-bottom-left-radius: 4px;
        }
        .message-right {
            align-self: flex-end;
            background: var(--accent);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .dm-shared-card {
            background: var(--surface);
            border-radius: 18px;
            padding: 8px;
            margin-top: 6px;
            border-left: 3px solid var(--accent);
            max-width: 260px;
        }
        .dm-shared-media {
            width: 100%;
            border-radius: 12px;
            max-height: 140px;
            object-fit: cover;
            margin-top: 6px;
        }
        .chat-input-area {
            display: flex;
            gap: 10px;
            padding: 12px;
            background: var(--surface);
            border-top: 1px solid var(--border);
        }
        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 30px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 0.9rem;
        }
        .chat-send-btn {
            background: var(--accent);
            border: none;
            border-radius: 30px;
            padding: 0 20px;
            color: white;
            font-weight: 600;
        }
        .back-to-dms {
            background: none;
            border: none;
            font-size: 1.2rem;
            color: var(--accent);
            cursor: pointer;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .share-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 300px;
            overflow-y: auto;
        }
        .share-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px;
            border-bottom: 1px solid var(--border);
        }
        .share-user {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .send-btn-sm {
            background: var(--accent);
            border: none;
            padding: 6px 16px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
        }
        .story-action-menu {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 8px;
        }
        .story-menu-btn {
            background: var(--accent-soft);
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            color: var(--text);
            cursor: pointer;
            width: 100%;
            text-align: center;
        }
        .story-menu-btn:active {
            opacity: 0.7;
        }
    </style>
</head>
<body>
<div id="app">
    <div class="header">
        <div class="logo-custom"><span class="logo-gul">Gul</span><span class="logo-ece">ECE</span></div>
        <div class="header-actions">
            <button class="icon-btn post-btn" id="createPostBtn">+</button>
            <button class="icon-btn" id="openMessagesBtn">✉️<span id="msgBadge" class="badge" style="display:none;">2</span></button>
        </div>
    </div>
    <div class="main-content" id="mainContent"></div>
    <div class="bottom-nav">
        <button class="nav-item active" data-tab="home"><span class="nav-icon">🏡</span><span>Home</span></button>
        <button class="nav-item" data-tab="videos"><span class="nav-icon">🎬</span><span>Reels</span></button>
        <button class="nav-item" data-tab="thoughts"><span class="nav-icon">💭</span><span>Thoughts</span></button>
        <button class="nav-item" data-tab="profile"><span class="nav-icon">🌸</span><span>Profile</span></button>
    </div>
    <div class="theme-float" id="themeFloatBtn">🌙</div>
</div>

<input type="file" id="galleryInput" accept="image/*,video/*" style="display: none;">
<input type="file" id="storyMediaInput" accept="image/*,video/*" style="display: none;">
<input type="file" id="avatarInput" accept="image/*" style="display: none;">

<div id="globalModal" class="modal-overlay" onclick="if(event.target===this) closeModal()">
    <div class="modal-card" id="modalContent"></div>
</div>

<script>
    // ---------- DATA WITH STORY OBJECTS ----------
    const currentUserId = 'you';

    const dummyUsers = [

        { id: 'u3', username: 'mindfultech', avatar: '✨', avatarUrl: null, name: 'Mindful Tech', stories: [{mediaUrl: 'https://picsum.photos/seed/s3_1/400/600', type: 'image'}] },
        { id: 'u4', username: 'wildfolks', avatar: '🌾', avatarUrl: null, name: 'Wild Folks', stories: [{mediaUrl: 'https://picsum.photos/seed/s4_1/400/600', type: 'image'}] },
    ];
    
    let posts = [
        { id: 1, userId: 'u1', type: 'image', mediaUrl: 'https://picsum.photos/id/20/800/800', caption: 'Morning pages & coffee ☕️', likes: 243, likedBy: [], comments: [], repostedBy: [] },
        { id: 2, userId: 'u2', type: 'image', mediaUrl: 'https://picsum.photos/id/30/800/800', caption: 'Farmers market haul 🥬', likes: 891, likedBy: [currentUserId], comments: [], repostedBy: [] },

    function renderThoughts() { let html = `<div style="background:var(--surface); margin:12px; border-radius:28px; padding:14px; display:flex; gap:12px;"><textarea id="newThought" placeholder="what's blooming today?" style="flex:1; background:var(--bg); border:none; border-radius:20px; padding:12px;"></textarea><button onclick="addThought()" style="background:var(--accent); border:none; border-radius:30px; padding:0 20px; color:white;">Post</button></div>`; thoughts.forEach(t => { const owner = getUserById(t.userId); const isLiked = t.likedBy.includes(currentUserId); const repostedByMe = t.repostedBy.includes(currentUserId); html += `<div class="post-card" style="padding:16px"><div><div style="display:flex; gap:10px;"><div class="post-avatar">${owner.avatarUrl ? `<img src="${owner.avatarUrl}">` : owner.avatar}</div><div><b>${owner.username}</b><p style="margin-top:6px">${t.text}</p><div style="display:flex; gap:20px; margin-top:12px"><button class="action-feed-btn ${isLiked ? 'liked' : ''}" onclick="toggleLike(thoughts.find(th=>th.id===${t.id}), true)">❤️ ${t.likes}</button><button class="action-feed-btn" onclick="openCommentModalForItem(thoughts.find(th=>th.id===${t.id}), true)">💬 ${(t.comments||[]).length}</button><button class="action-feed-btn ${repostedByMe ? 'liked' : ''}" onclick="toggleRepost(thoughts.find(th=>th.id===${t.id}), true)">🔄 ${t.repostedBy.length}</button><button class="action-feed-btn" onclick="openShareModalById(${t.id}, true)">↗️</button></div></div></div></div></div>`; }); setMainContent(html); }
    let showReelsMode = true; function renderVideosTab() { if (showReelsMode) { const reelsList = posts.filter(p => p.type === 'reel'); let reelsHtml = `<div class="switch-bar"><span>🎥 Reels</span><button class="back-btn" onclick="toggleReelsMode(false)">📺 Long videos →</button></div><div class="reels-container" id="reelsContainer">`; reelsList.forEach(reel => { const owner = getUserById(reel.userId); const isLiked = reel.likedBy.includes(currentUserId); reelsHtml += `<div class="reel-item"><video class="reel-video" src="${reel.mediaUrl}" loop playsinline></video><div class="reel-overlay"><b>${owner.username}</b><br>${reel.caption}</div><div class="reel-actions"><button class="reel-action-btn" onclick="toggleLike(posts.find(p=>p.id===${reel.id}), false)">${isLiked ? '❤️' : '🤍'}<span>${reel.likes}</span></button><button class="reel-action-btn" onclick="openCommentModalForItem(posts.find(p=>p.id===${reel.id}), false)">💬<span>${(reel.comments||[]).length}</span></button><button class="reel-action-btn" onclick="toggleRepost(posts.find(p=>p.id===${reel.id}), false)">🔄<span>${reel.repostedBy.length}</span></button><button class="reel-action-btn" onclick="openShareModalById(${reel.id}, false)">↗️</button></div></div>`; }); reelsHtml += `</div>`; setMainContent(reelsHtml); setTimeout(() => { document.querySelectorAll('.reel-video').forEach(v => { v.muted = false; v.volume = 1; const obs = new IntersectionObserver(entries => { entries.forEach(e => { if (e.isIntersecting) e.target.play().catch(()=>{}); else e.target.pause(); }); }, { threshold: 0.5 }); obs.observe(v); }); }, 100); } else { const longVideos = posts.filter(p => p.type === 'longvideo'); let listHtml = `<div class="switch-bar"><button class="back-btn" onclick="toggleReelsMode(true)">← Back to Reels</button><span>🎬 Library</span></div><div class="video-list">`; longVideos.forEach(v => { listHtml += `<div class="video-card" onclick="openLongVideoPlayer('${v.mediaUrl}','${v.longTitle || v.caption}')"><img class="video-thumb" src="https://picsum.photos/id/${v.id%100}/200/200"><div><b>${v.longTitle || v.caption}</b><br><small>${getUserById(v.userId).username} · ❤️ ${v.likes}</small><br><span style="background:var(--accent-soft); padding:2px 10px; border-radius:20px;">${v.duration || '10:00'}</span></div></div>`; }); listHtml += `</div>`; setMainContent(listHtml); } }
    function toggleReelsMode(toReels) { showReelsMode = toReels; renderVideosTab(); }
    function addThought() { const txt = document.getElementById('newThought')?.value.trim(); if(txt) { thoughts.unshift({ id: Date.now(), userId: currentUserId, text: txt, likes: 0, likedBy: [], comments: [], repostedBy: [] }); renderThoughts(); } }
    function openCommentModalForItem(item, isThought) { const comments = item.comments || []; let commentsHtml = `<h3>Comments · ${comments.length}</h3><div>`; comments.forEach(c => { const userObj = getUserById(c.userId); commentsHtml += `<div style="padding:8px 0; border-bottom:1px solid var(--border)"><b>${userObj.username}</b> ${c.text}</div>`; }); commentsHtml += `</div><div style="margin-top:16px; display:flex; gap:8px"><input id="newCommentInput" placeholder="Add a reply..." style="flex:1; padding:12px; border-radius:40px; border:1px solid var(--border); background:var(--bg);"><button onclick="submitComment(${item.id}, ${isThought})" style="background:var(--accent); border:none; border-radius:40px; padding:10px 18px;">Post</button></div>`; openModal(commentsHtml); }
    function submitComment(itemId, isThought) { const input = document.getElementById('newCommentInput'); if(!input?.value.trim()) return; const target = isThought ? thoughts.find(t => t.id === itemId) : posts.find(p => p.id === itemId); if(target) { if(!target.comments) target.comments = []; target.comments.push({ userId: currentUserId, text: input.value.trim() }); closeModal(); refreshCurrentView(); } }
    function openModal(html) { document.getElementById('modalContent').innerHTML = html; document.getElementById('globalModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('globalModal').style.display = 'none'; if(activeVideoPlayer) { activeVideoPlayer.pause(); activeVideoPlayer.currentTime = 0; activeVideoPlayer = null; } }
    function setMainContent(html) { document.getElementById('mainContent').innerHTML = html; }
    function refreshCurrentView() { if (activeTab === 'home') renderHome(); else if (activeTab === 'videos') renderVideosTab(); else if (activeTab === 'thoughts') renderThoughts(); else if (activeTab === 'profile') renderProfile(); }
    function setProfileTab(tab) { profileTab = tab; renderProfile(); }
    let activeVideoPlayer = null;
    function openLongVideoPlayer(url, title) { if (activeVideoPlayer) { activeVideoPlayer.pause(); activeVideoPlayer.currentTime = 0; } const playerHtml = `<div style="background:black; height:80vh; display:flex; flex-direction:column"><video id="longPlayer" controls autoplay src="${url}" style="width:100%; flex:1"></video><div style="padding:16px; color:white; background:#111">${title}</div><button onclick="closeLongPlayer()" style="margin:10px; padding:8px; background:gray; border-radius:40px;">Close</button></div>`; openModal(playerHtml); setTimeout(() => { activeVideoPlayer = document.getElementById('longPlayer'); }, 100); }
    function closeLongPlayer() { if (activeVideoPlayer) { activeVideoPlayer.pause(); activeVideoPlayer.currentTime = 0; activeVideoPlayer = null; } closeModal(); }
    
    let activeTab = 'home'; let theme = localStorage.getItem('verve-theme') === 'dark' ? 'dark' : 'light';
    function applyTheme() { document.body.classList.toggle('dark', theme === 'dark'); const themeBtn = document.getElementById('themeFloatBtn'); if(themeBtn) themeBtn.innerText = theme === 'dark' ? '☀️' : '🌙'; localStorage.setItem('verve-theme', theme); }
    applyTheme();
    document.querySelectorAll('.nav-item').forEach(btn => { btn.addEventListener('click', () => { const tab = btn.dataset.tab; document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active')); btn.classList.add('active'); activeTab = tab; if (tab === 'videos') showReelsMode = true; refreshCurrentView(); }); });
    document.getElementById('createPostBtn').addEventListener('click', () => { document.getElementById('galleryInput').click(); document.getElementById('galleryInput').onchange = (e) => { const file = e.target.files[0]; if(!file) return; const url = URL.createObjectURL(file); const isVideo = file.type.startsWith('video/'); const type = isVideo ? 'reel' : 'image'; const caption = prompt('Caption:'); posts.unshift({ id: Date.now(), userId: currentUserId, type, mediaUrl: url, caption: caption || '✨ new moment', likes:0, likedBy:[], comments:[], repostedBy:[] }); refreshCurrentView(); }; });
    document.getElementById('openMessagesBtn').addEventListener('click', openMessagePanel);
    document.getElementById('themeFloatBtn').addEventListener('click', () => { theme = theme === 'light' ? 'dark' : 'light'; applyTheme(); });
    
    window.openUserStoryMenu = openUserStoryMenu;
    window.addStoryFromPicker = addStoryFromPicker;
    window.sharePendingToUser = sharePendingToUser;
    window.openShareModalById = openShareModalById;
    window.startStoryViewer = startStoryViewer;
    window.toggleLike = toggleLike;
    window.toggleRepost = toggleRepost;
    window.openCommentModalForItem = openCommentModalForItem;
    window.submitComment = submitComment;
    window.addThought = addThought;
    window.setProfileTab = setProfileTab;
    window.toggleReelsMode = toggleReelsMode;
    window.openLongVideoPlayer = openLongVideoPlayer;
    window.closeLongPlayer = closeLongPlayer;
    window.closeModal = closeModal;
    window.openEditProfile = openEditProfile;
    window.saveProfileChanges = saveProfileChanges;
    window.openDM = openDM;
    window.sendChatMessage = sendChatMessage;
    window.handleChatKeyPress = handleChatKeyPress;
    window.changeProfilePicture = changeProfilePicture;
    window.openMessagePanel = openMessagePanel;
    window.deleteOwnPost = deleteOwnPost;
    window.undoRepost = undoRepost;
    
    renderHome();
</script>
</body>
</html>
