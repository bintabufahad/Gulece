<!DOCTYPE html>
<html lang="en">

    <style>
        * {

            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #f9f7f4;
            --surface: #ffffff;
            --text: #2c2b28;
            --text-secondary: #7c7a72;
            --accent: #c17a62;
            --accent-soft: #f0e4dd;
            --accent-dark: #a55f48;
            --border: #e9e2da;
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.04);
            --shadow-floating: 0 8px 20px rgba(0, 0, 0, 0.08);
            --radius-xl: 28px;
            --radius-lg: 20px;
            --font: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .dark {
            --bg: #1a1917;
            --surface: #24221f;
            --text: #ece8e0;
            --text-secondary: #b4aea2;
            --accent: #e2a181;
            --accent-soft: #3d3630;
            --border: #3a3530;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            transition: background 0.2s, color 0.2s;
        }

        .intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px;
            transition: opacity 0.5s ease;
        }
        .intro-card {
            background: var(--surface);
            border-radius: 48px;
            padding: 40px 28px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: var(--shadow-floating);
            animation: fadeUp 0.6s ease;

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }

        .intro-logo-custom {
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 4px;
            margin-bottom: 8px;
        }
        .intro-logo-gul {
            font-family: 'Pacifico', cursive;
            font-size: 2.5rem;
            font-weight: 500;
            color: var(--accent);
            letter-spacing: -0.5px;
            line-height: 1;
        }
        .intro-logo-ece {
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transform: rotate(-4deg) translateY(-2px);
            display: inline-block;
            color: var(--accent);
            background: var(--accent-soft);
            padding: 0px 6px;
            border-radius: 14px;
            font-family: var(--font);
        }
        .intro-verse {
            font-size: 1rem;
            line-height: 1.5;
            color: var(--text);
            margin: 24px 0;
            font-style: italic;
            font-weight: 500;
            border-left: 3px solid var(--accent);
            padding-left: 16px;
            text-align: left;
        }
        .intro-note {
            background: var(--accent-soft);
            border-radius: 24px;
            padding: 16px;
            margin: 20px 0;
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-align: left;
        }
        .enter-btn {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .enter-btn:active { transform: scale(0.97); }

        .toast-message {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--surface);
            color: var(--text);
            padding: 12px 20px;
            border-radius: 40px;
            box-shadow: var(--shadow-floating);
            font-size: 0.85rem;
            font-weight: 500;

            backdrop-filter: blur(10px);
            border: 1px solid var(--border);

            align-items: center;
            gap: 8px;

            gap: 2px;
            cursor: pointer;

            color: var(--accent);
            letter-spacing: -0.5px;

            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;

            display: inline-block;
            color: var(--accent);
            background: var(--accent-soft);
            padding: 0px 4px;
            border-radius: 12px;
            font-family: var(--font);

        .header-actions { display: flex; gap: 12px; align-items: center; }
        .icon-btn {

            border: none;
            font-size: 1.5rem;

            height: 40px;

        .badge {

            top: 4px;
            right: 6px;
            background: var(--accent);
            color: white;
            font-size: 0.6rem;
            font-weight: 700;
            width: 18px;
            height: 18px;
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;

        .main-content { flex: 1; overflow-y: auto; overflow-x: hidden; padding-bottom: 80px; scroll-behavior: smooth; }
        .bottom-nav {

            bottom: 0;
            left: 0;
            right: 0;

        .story-item { text-align: center; cursor: pointer; transition: 0.1s; }
        .story-avatar {

        .post-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .post-media { width: 100%; max-height: 450px; object-fit: cover; background: #1e1e1e; }
        .post-stats { padding: 8px 14px 0; font-weight: 600; font-size: 0.85rem; }
        .post-caption { padding: 4px 14px 12px; font-size: 0.9rem; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(6px); z-index: 200; display: none; align-items: flex-end; }
        .modal-card { background: var(--surface); width: 100%; max-width: 480px; margin: 0 auto; border-radius: 32px 32px 0 0; padding: 24px 20px 32px; animation: slideUp 0.2s ease; max-height: 80vh; overflow-y: auto; }

        .profile-tabs { display: flex; gap: 16px; padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--surface); }
        .profile-tab-btn { background: none; border: none; font-weight: 600; padding: 8px 0; color: var(--text-secondary); cursor: pointer; flex: 1; }
        .profile-tab-btn.active-tab { color: var(--accent); border-bottom: 2px solid var(--accent); }
        .story-viewer { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .story-viewer-content { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; }
        .story-header { position: absolute; top: 44px; left: 20px; z-index: 1002; display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); padding: 6px 16px; border-radius: 100px; color: white; }

        .msg-last-line { display: flex; align-items: center; gap: 4px; font-size: 0.8rem; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
        .truncate-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
        .repost-card-structured, .post-card-structured { background: var(--surface); border-radius: 20px; padding: 12px; box-shadow: var(--shadow-sm); margin-bottom: 12px; position: relative; }
        .reshare-badge, .post-badge { font-size: 0.7rem; margin-bottom: 6px; font-weight: 600; }

        .profile-avatar-large { width: 80px; height: 80px; background: var(--accent-soft); border-radius: 80px; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; font-size: 3rem; overflow: hidden; cursor: pointer; }

            storiesHtml += `<div class="post-card"><div class="post-header"><div class="post-avatar">${owner.avatarUrl ? `<img src="${owner.avatarUrl}">` : owner.avatar}</div><b>${owner.username}</b></div>${resharedByMe ? '<div style="font-size:0.7rem; color:var(--accent); padding: 0 14px 4px;">🔄 You reshared</div>' : ''}${mediaTag}<div class="post-stats">❤️ ${item.likes} likes</div><div class="post-caption"><b>${owner.username}</b> ${item.caption}</div><div class="action-row"><button class="action-feed-btn ${isLiked ? 'liked' : ''}" onclick="toggleLike(posts.find(p=>p.id===${item.id}), false)">❤️ ${item.likes}</button><button class="action-feed-btn" onclick="openCommentModalForItem(posts.find(p=>p.id===${item.id}), false)">💬 ${(item.comments||[]).length}</button><button class="action-feed-btn ${resharedByMe ? 'liked' : ''}" onclick="toggleReshare(posts.find(p=>p.id===${item.id}), false)">🔄 ${(item.resharedBy||[]).length}</button><button class="action-feed-btn" onclick="openShareModalById(${item.id}, false)">↗️</button></div></div>`; 
        }); 
        if (feedPosts.length === 0) storiesHtml += `<p style="padding:20px; text-align:center; color:var(--text-secondary)">No posts yet. Tap + to create!</p>`;
        storiesHtml += `</div>`; 
        setMainContent(`<div class="home-layout">${storiesHtml}</div>`); 
    }
    
    function renderThoughts() { 
        let html = `<div style="background:var(--surface); margin:12px; border-radius:28px; padding:14px; display:flex; gap:12px;"><textarea id="newThought" placeholder="what's blooming today?" style="flex:1; background:var(--bg); border:none; border-radius:20px; padding:12px;"></textarea><button onclick="addThought()" style="background:var(--accent); border:none; border-radius:30px; padding:0 20px; color:white;">Post</button></div>`; 
        let sortedThoughts = [...thoughts].sort((a,b) => b.createdAt - a.createdAt);
        sortedThoughts.forEach(t => { 
            const owner = getUserById(t.userId); 
            const isLiked = t.likedBy.includes(currentUserId); 
            const resharedByMe = t.resharedBy.includes(currentUserId); 
            html += `<div class="post-card" style="padding:16px"><div><div style="display:flex; gap:10px;"><div class="post-avatar">${owner.avatarUrl ? `<img src="${owner.avatarUrl}">` : owner.avatar}</div><div><b>${owner.username}</b><p style="margin-top:6px">${t.text}</p><div style="display:flex; gap:20px; margin-top:12px"><button class="action-feed-btn ${isLiked ? 'liked' : ''}" onclick="toggleLike(thoughts.find(th=>th.id===${t.id}), true)">❤️ ${t.likes}</button><button class="action-feed-btn" onclick="openCommentModalForItem(thoughts.find(th=>th.id===${t.id}), true)">💬 ${(t.comments||[]).length}</button><button class="action-feed-btn ${resharedByMe ? 'liked' : ''}" onclick="toggleReshare(thoughts.find(th=>th.id===${t.id}), true)">🔄 ${t.resharedBy.length}</button><button class="action-feed-btn" onclick="openShareModalById(${t.id}, true)">↗️</button></div></div></div></div></div>`; 
        }); 
        setMainContent(html); 
    }
    
    let showReelsMode = true; 
    function renderVideosTab() { 
        if (showReelsMode) { 
            const reelsList = posts.filter(p => p.type === 'reel'); 
            let reelsHtml = `<div class="switch-bar"><span>🎥 Reels</span><button class="back-btn" onclick="toggleReelsMode(false)">📺 Long videos →</button></div><div class="reels-container" id="reelsContainer">`; 
            reelsList.forEach(reel => { const owner = getUserById(reel.userId); const isLiked = reel.likedBy.includes(currentUserId); 
            reelsHtml += `<div class="reel-item"><video class="reel-video" src="${reel.mediaUrl}" loop playsinline></video><div class="reel-overlay"><b>${owner.username}</b><br>${reel.caption}</div><div class="reel-actions"><button class="reel-action-btn" onclick="toggleLike(posts.find(p=>p.id===${reel.id}), false)">${isLiked ? '❤️' : '🤍'}<span>${reel.likes}</span></button><button class="reel-action-btn" onclick="openCommentModalForItem(posts.find(p=>p.id===${reel.id}), false)">💬<span>${(reel.comments||[]).length}</span></button><button class="reel-action-btn" onclick="toggleReshare(posts.find(p=>p.id===${reel.id}), false)">🔄<span>${reel.resharedBy.length}</span></button><button class="reel-action-btn" onclick="openShareModalById(${reel.id}, false)">↗️</button></div></div>`; }); 
            reelsHtml += `</div>`; setMainContent(reelsHtml); 
            setTimeout(() => { document.querySelectorAll('.reel-video').forEach(v => { v.muted = false; v.volume = 1; const obs = new IntersectionObserver(entries => { entries.forEach(e => { if (e.isIntersecting) e.target.play().catch(()=>{}); else e.target.pause(); }); }, { threshold: 0.5 }); obs.observe(v); }); }, 100); 
        } else { 
            const longVideos = posts.filter(p => p.type === 'longvideo'); 
            let listHtml = `<div class="switch-bar"><button class="back-btn" onclick="toggleReelsMode(true)">← Back to Reels</button><span>🎬 Library</span></div><div class="video-list">`; 
            longVideos.forEach(v => { listHtml += `<div class="video-card" onclick="openLongVideoPlayer('${v.mediaUrl}','${v.longTitle || v.caption}')"><img class="video-thumb" src="https://picsum.photos/id/${v.id%100}/200/200"><div><b>${v.longTitle || v.caption}</b><br><small>${getUserById(v.userId).username} · ❤️ ${v.likes}</small><br><span style="background:var(--accent-soft); padding:2px 10px; border-radius:20px;">${v.duration || '10:00'}</span></div></div>`; }); listHtml += `</div>`; setMainContent(listHtml); 
        } 
    }
    function toggleReelsMode(toReels) { showReelsMode = toReels; renderVideosTab(); }
    function addThought() { const txt = document.getElementById('newThought')?.value.trim(); if(txt) { thoughts.unshift({ id: Date.now(), userId: currentUserId, text: txt, likes: 0, likedBy: [], comments: [], resharedBy: [], createdAt: Date.now() }); renderThoughts(); showToast("Thought shared", "💭"); } }
    function openCommentModalForItem(item, isThought) { const comments = item.comments || []; let commentsHtml = `<h3>Comments · ${comments.length}</h3><div>`; comments.forEach(c => { const userObj = getUserById(c.userId); commentsHtml += `<div style="padding:8px 0; border-bottom:1px solid var(--border)"><b>${userObj.username}</b> ${c.text}</div>`; }); commentsHtml += `</div><div style="margin-top:16px; display:flex; gap:8px"><input id="newCommentInput" placeholder="Add a reply..." style="flex:1; padding:12px; border-radius:40px; border:1px solid var(--border); background:var(--bg);"><button onclick="submitComment(${item.id}, ${isThought})" style="background:var(--accent); border:none; border-radius:40px; padding:10px 18px;">Post</button></div>`; openModal(commentsHtml); }
    function submitComment(itemId, isThought) { const input = document.getElementById('newCommentInput'); if(!input?.value.trim()) return; const target = isThought ? thoughts.find(t => t.id === itemId) : posts.find(p => p.id === itemId); if(target) { if(!target.comments) target.comments = []; target.comments.push({ userId: currentUserId, text: input.value.trim() }); closeModal(); refreshCurrentView(); showToast("Comment added", "💬"); } }
    function openModal(html) { document.getElementById('modalContent').innerHTML = html; document.getElementById('globalModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('globalModal').style.display = 'none'; if(activeVideoPlayer) { activeVideoPlayer.pause(); activeVideoPlayer.currentTime = 0; activeVideoPlayer = null; } }
    function setMainContent(html) { document.getElementById('mainContent').innerHTML = html; }
    function refreshCurrentView() { if (activeTab === 'home') renderHome(); else if (activeTab === 'videos') renderVideosTab(); else if (activeTab === 'thoughts') renderThoughts(); else if (activeTab === 'profile') renderProfile(); }
    function setProfileTab(tab) { profileTab = tab; renderProfile(); }
    let activeVideoPlayer = null;
    function openLongVideoPlayer(url, title) { if (activeVideoPlayer) { activeVideoPlayer.pause(); activeVideoPlayer.currentTime = 0; } const playerHtml = `<div style="background:black; height:80vh; display:flex; flex-direction:column"><video id="longPlayer" controls autoplay src="${url}" style="width:100%; flex:1"></video><div style="padding:16px; color:white; background:#111">${title}</div><button onclick="closeLongPlayer()" style="margin:10px; padding:8px; background:gray; border-radius:40px;">Close</button></div>`; openModal(playerHtml); setTimeout(() => { activeVideoPlayer = document.getElementById('longPlayer'); }, 100); }
    function closeLongPlayer() { if (activeVideoPlayer) { activeVideoPlayer.pause(); activeVideoPlayer.currentTime = 0; activeVideoPlayer = null; } closeModal(); }
    
    let activeTab = 'home'; let theme = localStorage.getItem('gulece-theme') === 'dark' ? 'dark' : 'light';
    function applyTheme() { document.body.classList.toggle('dark', theme === 'dark'); const themeBtn = document.getElementById('themeFloatBtn'); if(themeBtn) themeBtn.innerText = theme === 'dark' ? '☀️' : '🌙'; localStorage.setItem('gulece-theme', theme); }
    
    window.initAppAfterIntro = function() {
        const appContainer = document.getElementById('app');
        appContainer.innerHTML = `
            <div class="header">
                <div class="logo-custom" id="logoHomeBtn"><span class="logo-gul">Gul</span><span class="logo-ece">ECE</span></div>
                <div class="header-actions">
                    <button class="icon-btn post-btn" id="createPostBtn">+</button>
                    <button class="icon-btn" id="openMessagesBtn">✉️<span id="msgBadge" class="badge" style="display:none;">2</span></button>
                </div>
            </div>
            <div class="main-content" id="mainContent"></div>
            <div class="bottom-nav">
                <button class="nav-item active" data-tab="home"><span class="nav-icon">🏡</span><span>Home</span></button>
                <button class="nav-item" data-tab="videos"><span class="nav-icon">🎬</span><span>Reels</span></button>
                <button class="nav-item" data-tab="thoughts"><span class="nav-icon">💭</span><span>Thoughts</span></button>
                <button class="nav-item" data-tab="profile"><span class="nav-icon">🌸</span><span>Profile</span></button>
            </div>
            <div class="theme-float" id="themeFloatBtn">🌙</div>
        `;
        applyTheme();
        document.getElementById('logoHomeBtn')?.addEventListener('click', goHome);
        document.getElementById('createPostBtn')?.addEventListener('click', openCreateMenu);
        document.getElementById('openMessagesBtn')?.addEventListener('click', openMessagePanel);
        document.getElementById('themeFloatBtn')?.addEventListener('click', () => { theme = theme === 'light' ? 'dark' : 'light'; applyTheme(); });
        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.dataset.tab;
                document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                activeTab = tab;
                if (tab === 'videos') showReelsMode = true;
                refreshCurrentView();
            });
        });
        renderHome();
    };
    
    // Intro overlay (shows every time)
    const introDiv = document.createElement('div');
    introDiv.className = 'intro-overlay';
    introDiv.id = 'introOverlay';
    introDiv.innerHTML = `
        <div class="intro-card">
            <div class="intro-logo-custom">
                <span class="intro-logo-gul">Gul</span>
                <span class="intro-logo-ece">ECE</span>
            </div>
            <div class="intro-verse">
                ✨ "And tell the believing women to lower their gaze and guard their modesty..." — Qur'an 24:31 ✨
            </div>
            <div class="intro-note">
                🌸 A private sanctuary for Muslim women.<br>
                Your face, your voice, your soul — seen only by sisters.<br>
                <strong>Future verification</strong> will ensure this remains a safe, women-only space.
            </div>
            <button class="enter-btn" id="enterGuleceBtn">🌸 Enter Gulece</button>
        </div>
    `;
    document.body.appendChild(introDiv);
    document.getElementById('enterGuleceBtn').addEventListener('click', () => {
        introDiv.style.opacity = '0';
        setTimeout(() => {
            introDiv.remove();
            window.initAppAfterIntro();
        }, 500);
    });
</script>
</body>
</html>
